# Example usage text for ctx CLI.
# Used by desc.Example() for cobra Example fields.
# Keys match command desc keys from commands.yaml.
#
# UPDATE THIS FILE when command usage changes (new flags,
# renamed subcommands, changed arguments). Examples shown
# in --help output must stay accurate. Drift between this
# file and actual command behavior confuses users.
#
# See also: commands.yaml (Short/Long), flags.yaml (flag descriptions).

convention.add:
  short: |2-
      ctx convention add "Use camelCase for function names"
      ctx convention add "All API responses use JSON"

decision.add:
  short: |2-
      ctx decision add "Use PostgreSQL for primary database" \
        --session-id abc12345 --branch main --commit 68fbc00a \
        --context "Need a reliable database for production" \
        --rationale "ACID compliance and JSON support" \
        --consequence "Team needs PostgreSQL training"

learning.add:
  short: |2-
      ctx learning add "Go embed requires files in same package" \
        --session-id abc12345 --branch main --commit 68fbc00a \
        --context "Tried to embed files from parent directory" \
        --lesson "go:embed only works with files in same or child directories" \
        --application "Keep embedded files in internal/templates/"

task.add:
  short: |2-
      ctx task add "Implement user authentication" \
        --session-id abc12345 --branch main --commit 68fbc00a \
        --priority high
      ctx task add "Fix login bug" --session-id ... --branch ... --commit ...

