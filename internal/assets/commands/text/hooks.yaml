hook.agents:
  short: |
    AGENTS.md (Universal Agent Instructions)
    =========================================

    Generate AGENTS.md in the project root with universal
    agent instructions that work across all AI coding tools.

    AGENTS.md is read natively by: Codex, Gemini CLI, OpenCode,
    Claude Code, and GitHub Copilot CLI.

    Run with --write to generate:

      ctx setup agents --write
hook.aider:
  short: |
    Aider Integration
    =================

    Add to your .aider.conf.yml:

    ```yaml
    read:
      - .context/CONSTITUTION.md
      - .context/TASKS.md
      - .context/CONVENTIONS.md
      - .context/ARCHITECTURE.md
      - .context/DECISIONS.md
    ```

    Or pass context via command line:

    ```bash
    ctx agent | aider --message "$(cat -)"
    ```
hook.copilot:
  short: |
    GitHub Copilot Integration
    ==========================

    Add the following to .github/copilot-instructions.md,
    or run with --write to generate the file directly:

      ctx setup copilot --write
hook.copilot-cli:
  short: |
    GitHub Copilot CLI Integration
    ==============================

    Generate .github/hooks/ with ctx lifecycle hooks
    for the GitHub Copilot CLI agent (cross-platform).

    This creates:
      .github/hooks/ctx-hooks.json    Hook configuration
      .github/hooks/scripts/*.sh      Bash scripts (Linux/macOS/WSL)
      .github/hooks/scripts/*.ps1     PowerShell scripts (Windows)

    Run with --write to generate all files:

      ctx setup copilot-cli --write
hook.opencode:
  short: |
    OpenCode Integration
    ====================

    Generate .opencode/plugins/ctx.ts with ctx lifecycle hooks
    and register the ctx MCP server in opencode.json.

    This creates:
      .opencode/plugins/ctx.ts             Plugin shim
      .opencode/skills/ctx-*/SKILL.md      ctx skills
      opencode.json                        MCP server registration
      AGENTS.md                            Agent instructions

    Run with --write to generate all files:

      ctx setup opencode --write
hook.supported-tools:
  short: |
    Supported tools:
      agents       - AGENTS.md (universal agent instructions)
      claude-code  - Anthropic's Claude Code CLI (use plugin instead)
      cursor       - Cursor IDE
      aider        - Aider AI coding assistant
      copilot      - GitHub Copilot (VS Code extension)
      copilot-cli  - GitHub Copilot CLI (terminal agent)
      opencode     - OpenCode terminal AI agent
      windsurf     - Windsurf IDE
hook.windsurf:
  short: |
    Windsurf Integration
    ====================

    Add to your .windsurfrules file:

    ```markdown
    # Context

    Read order for context:
    1. .context/CONSTITUTION.md
    2. .context/TASKS.md
    3. .context/CONVENTIONS.md
    4. .context/ARCHITECTURE.md
    5. .context/DECISIONS.md

    Run 'ctx agent' for AI-ready context packet.
    ```
