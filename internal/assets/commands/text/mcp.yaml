    - %s (omitted for budget)
mcp.packet-header:
  short: |+
    # Context Packet

mcp.err-parse:
  short: parse error
mcp.err-query-required:
  short: query is required
mcp.err-search-read:
  short: 'search: read %s: %w'
mcp.res-agent:
  short: All context files assembled in priority read order
mcp.res-architecture:
  short: System architecture documentation
mcp.res-constitution:
  short: Hard rules that must never be violated
mcp.res-conventions:
  short: Code patterns and standards
mcp.res-decisions:
  short: Architectural decisions with rationale
mcp.res-glossary:
  short: Project-specific terminology
mcp.res-learnings:
  short: Gotchas, tips, and lessons learned
mcp.res-playbook:
  short: How agents should use this system
mcp.res-tasks:
  short: Current work items and their status
mcp.format-section:
  short: |+
    ---
    ## %s

    %s

mcp.status-context-format:
  short: |
    Context: %s
mcp.status-empty:
  short: EMPTY
mcp.status-file-format:
  short: |2
      %-22s %6d tokens  [%s]
mcp.status-files-format:
  short: |
    Files: %d
mcp.status-ok:
  short: OK
mcp.status-usage-format:
  short: |+
    Tokens: ~%d

mcp.tool-add-desc:
  short: Add a task, decision, learning, or convention to the context
mcp.tool-complete-desc:
  short: Mark a task as done by number or text match
mcp.tool-drift-desc:
  short: 'Detect stale or invalid context: dead paths, missing files, staleness'
mcp.tool-prop-application:
  short: How to apply this lesson (required for learnings)
mcp.tool-prop-consequence:
  short: Consequence (required for decisions)
mcp.tool-prop-content:
  short: Title or main content of the entry
mcp.tool-prop-context:
  short: Context field (required for decisions and learnings)
mcp.tool-prop-lesson:
  short: Lesson learned (required for learnings)
mcp.tool-prop-priority:
  short: Priority level (for tasks only)
mcp.tool-prop-section:
  short: Target section in TASKS.md (required for tasks, e.g. "Misc")
mcp.tool-prop-query:
  short: Task number (e.g. '1') or search text to match
mcp.tool-prop-rationale:
  short: Rationale (required for decisions)
mcp.tool-prop-type:
  short: Entry type to add
mcp.tool-status-desc:
  short: 'Show context health: file count, token estimate, and file summaries'
mcp.err-type-content-required:
  short: type and content are required
mcp.err-unknown-resource:
  short: 'unknown resource: %s'
mcp.err-unknown-tool:
  short: 'unknown tool: %s'

mcp.all-tasks-complete:
  short: All tasks completed. No pending work.
mcp.check-task-format:
  short: 'Did this complete task #%d: "%s"?'
mcp.check-task-hint:
  short: 'If yes, run: ctx task complete %d'
mcp.compact-clean:
  short: Nothing to compact - context is already clean.
mcp.format-compacted:
  short: "\nCompacted %d items. This reorganized TASKS.md.\n"
mcp.event-type-required:
  short: type is required (start|end)
mcp.invalid-since-date:
  short: 'invalid since date (use YYYY-MM-DD): %v'
mcp.next-task-format:
  short: 'Next task (#%d): %s'
mcp.no-pending:
  short: No pending updates.
mcp.no-reminders:
  short: No reminders.
mcp.no-sessions:
  short: No sessions found.
mcp.no-tasks:
  short: No TASKS.md found.
mcp.pending-updates-format:
  short: "%d pending updates queued.\n"
mcp.prompt-add-decision-desc:
  short: Record an architectural decision with context, rationale, and consequence
mcp.prompt-add-decision-field-format:
  short: "- **%s**: %s\n"
mcp.prompt-label-decision:
  short: Decision
mcp.prompt-label-context:
  short: Context
mcp.prompt-label-rationale:
  short: Rationale
mcp.prompt-label-consequence:
  short: Consequence
mcp.prompt-label-learning:
  short: Learning
mcp.prompt-label-lesson:
  short: Lesson
mcp.prompt-label-application:
  short: Application
mcp.prompt-add-decision-footer:
  short: Call ctx_add with type="decision" and all fields above.
mcp.prompt-add-decision-header:
  short: 'Record this architectural decision using ctx_add:'
mcp.prompt-add-decision-result-desc:
  short: Record an architectural decision
mcp.prompt-add-learning-desc:
  short: Record a lesson learned with context, lesson, and application
mcp.prompt-add-learning-field-format:
  short: "- **%s**: %s\n"
mcp.prompt-add-learning-footer:
  short: Call ctx_add with type="learning" and all fields above.
mcp.prompt-add-learning-header:
  short: 'Record this learning using ctx_add:'
mcp.prompt-add-learning-result-desc:
  short: Record a lesson learned
mcp.prompt-arg-decision-consequence:
  short: Impact of the decision
mcp.prompt-arg-decision-ctx:
  short: Background context for the decision
mcp.prompt-arg-decision-rationale:
  short: Why this decision was made
mcp.prompt-arg-decision-title:
  short: Decision title
mcp.prompt-arg-learning-app:
  short: How to apply this lesson
mcp.prompt-arg-learning-ctx:
  short: Background context
mcp.prompt-arg-learning-lesson:
  short: What was learned
mcp.prompt-arg-learning-title:
  short: Learning title
mcp.prompt-checkpoint-desc:
  short: Summarize session progress and persist important context before ending
mcp.prompt-checkpoint-header:
  short: 'Session checkpoint. Before ending this session:'
mcp.prompt-checkpoint-result-desc:
  short: Summarize session progress and persist context
mcp.prompt-checkpoint-stats-format:
  short: '- Tool calls this session: %d

    - Entries added: %d

    - Pending updates: %d


    '
mcp.prompt-checkpoint-steps:
  short: '1. Check ctx_status for current context state

    2. Record any remaining decisions or learnings

    3. Mark completed tasks with ctx_complete

    4. Run ctx_compact if needed

    5. Call ctx_session_event type="end" when done


    '
mcp.prompt-reflect-body:
  short: 'Reflect on this session and identify:


    1. **Decisions made** - Record each with ctx_add type="decision"

    2. **Lessons learned** - Record each with ctx_add type="learning"

    3. **Tasks completed** - Mark done with ctx_complete

    4. **New tasks identified** - Add with ctx_add type="task"


    Review what was discussed and changed. Don''t let important context slip away.


    '
mcp.prompt-reflect-desc:
  short: Review the current session and capture outstanding learnings and decisions
mcp.prompt-reflect-result-desc:
  short: Review session for outstanding learnings and decisions
mcp.prompt-section-format:
  short: '## %s


    %s


    '
mcp.prompt-session-start-desc:
  short: 'Initialize a new session: loads full context and provides orientation'
mcp.prompt-session-start-footer:
  short: Remember this context throughout the session. Use ctx_add to record decisions
    and learnings as you work. At session end, use ctx-checkpoint to capture outstanding
    context.
mcp.prompt-session-start-header:
  short: You are starting a new session. Read the following context files carefully.
mcp.prompt-session-start-result-desc:
  short: Session initialization with full context load
mcp.reminders-format:
  short: "%d reminder(s):\n"
mcp.review-pending:
  short: Review pending context updates before persisting.
mcp.review-status:
  short: 'Review with: ctx status'
mcp.session-ending:
  short: Session ending.
mcp.session-started-caller-format:
  short: 'Session started for %s. Context: %s'
mcp.session-started-format:
  short: 'Session started. Context: %s'
mcp.format-session-stats:
  short: "\nSession stats: %d tool calls, %d entries added."
mcp.sessions-found-format:
  short: "Found %d session(s):\n\n"
mcp.tool-check-task-desc:
  short: 'Advisory check: after a write operation, detect if any pending tasks were
    silently completed. Returns nudge text if found.'
mcp.tool-compact-desc:
  short: Move completed tasks to archive section. Removes empty sections from all
    context files. Human confirmation required - this reorganizes TASKS.md.
mcp.tool-next-desc:
  short: Suggest the next pending task based on priority and recency
mcp.tool-prop-archive:
  short: Also write tasks to .context/archive/ (default false)
mcp.tool-prop-caller:
  short: Caller identifier (cursor|windsurf|vscode|claude-desktop)
mcp.tool-prop-ctx-background:
  short: Context background (required for decisions/learnings)
mcp.tool-prop-entry-type:
  short: 'Entry type: task|decision|learning|convention|complete'
mcp.tool-prop-event-type:
  short: 'Event type: start|end'
mcp.tool-prop-limit:
  short: Max sessions to return (default 5)
mcp.tool-prop-main-content:
  short: Main content
mcp.tool-prop-recent-action:
  short: Brief description of what was just done
mcp.tool-prop-since:
  short: 'ISO date filter: sessions after this date (YYYY-MM-DD)'
mcp.tool-journal-source-desc:
  short: Query recent AI session history (summaries, decisions, topics)
mcp.tool-remind-desc:
  short: List pending session-scoped reminders
mcp.tool-session-desc:
  short: Signal a session lifecycle event. Type 'end' triggers the session-end persistence
    ceremony - human confirmation required.
mcp.tool-watch-update-desc:
  short: Apply a structured context-update to .context/ files (learning, decision,
    task, convention, complete). Human confirmation required before calling.
mcp.journal-source-item-format:
  short: '%d. %s'
mcp.journal-source-project-format:
  short: ' [%s]'
mcp.journal-source-duration-format:
  short: ' (%s, %d turns)'
mcp.journal-source-first-msg-format:
  short: '   %s'
mcp.compact-moved-format:
  short: 'Moved: %s'
mcp.compact-archive-warning:
  short: 'Archive warning: %v'
mcp.compact-removed-sections-format:
  short: 'Removed %d empty sections from %s'
mcp.format-pending-item:
  short: '  %d. [%s] %s'
mcp.format-reminder-item:
  short: '  [%d] %s%s'
mcp.format-reminder-not-due:
  short: ' (after %s, not yet due)'
mcp.unknown-event-type:
  short: 'unknown event type: %s (use start|end)'
mcp.err-unknown-prompt:
  short: 'unknown prompt: %s'
mcp.err-uri-required:
  short: uri is required
mcp.err-input-too-long:
  short: '%s exceeds maximum length (%d bytes)'
mcp.err-unknown-entry-type:
  short: 'unknown entry type: %s'
mcp.format-watch-completed:
  short: 'Completed: %s'
mcp.format-wrote:
  short: Wrote %s to .context/%s.

mcp.gov-session-not-started:
  short: '⚠ Session not started. Call ctx_session_event(type="start") to enable tracking.'
mcp.gov-context-not-loaded:
  short: '⚠ Context not loaded. Call ctx_status() to load context before proceeding.'
mcp.gov-drift-not-checked:
  short: '⚠ Drift not checked in %d minutes. Consider calling ctx_drift().'
mcp.gov-drift-never-checked:
  short: '⚠ Drift has not been checked this session. Consider calling ctx_drift().'
mcp.gov-persist-nudge:
  short: '⚠ %d tool calls since last context write. Persist decisions, learnings, or completed tasks with ctx_add() or ctx_complete().'
mcp.gov-violation-critical:
  short: '🚨 CRITICAL: %s, %s (at %s). Review this action immediately. If unintended, revert it.'

mcp.tool-steering-get-desc:
  short: Retrieve applicable steering files for a prompt. Without a prompt, returns always-included files only.
mcp.tool-search-desc:
  short: Search across .context/ files for a query string. Returns matching lines with file paths and line numbers.
mcp.tool-session-start-desc:
  short: Execute session-start hooks and return aggregated context from hook outputs.
mcp.tool-session-end-desc:
  short: Execute session-end hooks with an optional summary. Returns aggregated context from hook outputs.
mcp.tool-prop-prompt:
  short: Optional prompt text for steering file inclusion matching
mcp.tool-prop-search-query:
  short: Text to search for across context files
mcp.tool-prop-summary:
  short: Optional session summary passed to session-end hooks
