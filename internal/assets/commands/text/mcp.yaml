# MCP server text strings for ctx CLI.
# Used by assets.TextDesc() for MCP JSON-RPC responses.

mcp.added-format:
  short: Added %s to %s
mcp.also-noted:
  short: |+
    ---
    ## Also Noted

mcp.completed-format:
  short: 'Completed: %s'
