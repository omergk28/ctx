err.init.ctx-not-in-path:
  short: |-
    Error: ctx is not in your PATH
    The hooks created by 'ctx init' require ctx to be in your PATH.
    Without this, Claude Code hooks will fail silently.

    To fix this:
      1. Build:   make build
      2. Install: sudo make install

    Or manually:
      sudo cp ./ctx /usr/local/bin/

    Then run 'ctx init' again.
