write.init-claude-absent:
  short: |

    Claude Code is not installed on this machine.

    To use ctx with Claude Code:

      1. Install Claude Code: https://claude.ai/download

      2. Launch it once so it completes initial setup:

           claude

      3. Install the ctx plugin from your local clone:

           /plugin                          ← inside claude
           Marketplaces → Add Marketplace
           <path-to-your-ctx-clone>         ← e.g. ~/WORKSPACE/ctx
           Back in /plugin → Install → ctx

         Install at USER scope so the plugin is available
         across all your projects without per-project
         enablement.

      4. Re-run `ctx init` in this project to auto-enable
         the plugin for use here.

    If you don't use Claude Code, ignore this. ctx works
    with Cursor, Kiro, Cline, Aider, Copilot, and Windsurf
    as well (see `ctx setup --help`).
write.init-claude-plugin-missing:
  short: |

    Claude Code detected, but the ctx plugin is not installed.

    Install from your local clone of the ctx repository:

      1. Launch Claude Code:

           claude

      2. Type `/plugin` and press Enter.

      3. Select Marketplaces → Add Marketplace.

      4. Enter the path to your ctx clone (the directory
         that contains `.claude-plugin/marketplace.json`),
         for example:

           ~/WORKSPACE/ctx

      5. Back in `/plugin`, select Install and choose `ctx`.

         ⚠ Install at USER scope. Local plugin installs are
         NOT auto-enabled globally by Claude Code; user
         scope avoids the per-project enablement gotcha.

      6. Re-run `ctx init` in this project to wire up the
         local enablement (it's a no-op if already enabled).

    This points Claude Code at the plugin source on disk, so
    changes you make to hooks or skills take effect
    immediately, no reinstall needed.
